openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Angry Birds Game API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: progress
    description: Player progress operations
  - name: scores
    description: High score operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /progress:
    get:
      operationId: getProgress
      tags: [progress]
      summary: Get all level progress
      description: Returns progress for all levels (stars earned, best score)
      responses:
        "200":
          description: All level progress
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LevelProgress"
    post:
      operationId: saveProgress
      tags: [progress]
      summary: Save level progress
      description: Save or update progress for a completed level
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveProgressRequest"
      responses:
        "200":
          description: Progress saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LevelProgress"

  /progress/{levelId}:
    get:
      operationId: getLevelProgress
      tags: [progress]
      summary: Get progress for a specific level
      parameters:
        - name: levelId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Level progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LevelProgress"
        "404":
          description: Level not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scores:
    get:
      operationId: getHighScores
      tags: [scores]
      summary: Get global high scores
      description: Returns top scores across all levels
      responses:
        "200":
          description: High scores list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HighScore"
    post:
      operationId: submitScore
      tags: [scores]
      summary: Submit a high score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitScoreRequest"
      responses:
        "201":
          description: Score submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HighScore"

  /stats:
    get:
      operationId: getStats
      tags: [progress]
      summary: Get overall game statistics
      responses:
        "200":
          description: Game stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LevelProgress:
      type: object
      properties:
        id:
          type: integer
        levelId:
          type: integer
        stars:
          type: integer
          minimum: 0
          maximum: 3
        bestScore:
          type: integer
        completed:
          type: boolean
        attempts:
          type: integer
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - levelId
        - stars
        - bestScore
        - completed
        - attempts
        - updatedAt

    SaveProgressRequest:
      type: object
      properties:
        levelId:
          type: integer
        stars:
          type: integer
          minimum: 0
          maximum: 3
        score:
          type: integer
        playerName:
          type: string
      required:
        - levelId
        - stars
        - score

    HighScore:
      type: object
      properties:
        id:
          type: integer
        playerName:
          type: string
        levelId:
          type: integer
        score:
          type: integer
        stars:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - playerName
        - levelId
        - score
        - stars
        - createdAt

    SubmitScoreRequest:
      type: object
      properties:
        playerName:
          type: string
        levelId:
          type: integer
        score:
          type: integer
        stars:
          type: integer
          minimum: 0
          maximum: 3
      required:
        - playerName
        - levelId
        - score
        - stars

    GameStats:
      type: object
      properties:
        totalLevels:
          type: integer
        completedLevels:
          type: integer
        totalStars:
          type: integer
        maxStars:
          type: integer
        totalScore:
          type: integer
      required:
        - totalLevels
        - completedLevels
        - totalStars
        - maxStars
        - totalScore

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
